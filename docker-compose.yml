version: '3.8'

services:
  backend:
    build: .
    container_name: retrievix-backend
    ports:
      - "5000:5000"
    environment:
      # Pass through all .env variables
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # This overrides the local 127.0.0.1 to use the Docker network
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - .env
    depends_on:
      - ai-service
    restart: unless-stopped
    networks:
      - retrievix-net

  ai-service:
    build: ./clip_service
    container_name: retrievix-ai-service
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - retrievix-net

networks:
  retrievix-net:
    driver: bridge
